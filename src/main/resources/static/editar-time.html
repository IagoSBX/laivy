<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Time — LAIVY</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--verde:#00C97A;--azul:#0A1628;--branco:#F0F4FF;--cinza:#8899BB;
  --sidebar-w:240px;--card-bg:linear-gradient(135deg,#0D1E3C,#112244);
  --card-border:rgba(255,255,255,0.06);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--azul);color:var(--branco);min-height:100vh;display:flex;}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0D1E3C,#091525);border-right:1px solid rgba(0,201,122,0.1);display:flex;flex-direction:column;padding:28px 0;position:fixed;top:0;left:0;height:100vh;z-index:100;; overflow-y: auto; }
.sidebar-logo{padding:0 24px 28px;border-bottom:1px solid rgba(0,201,122,0.1);display:flex;align-items:center;gap:12px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--verde),#00A865);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:22px;color:var(--azul);}
.logo-texts .t1{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;}
.logo-texts .t2{font-size:10px;color:var(--cinza);letter-spacing:1px;}
nav{flex:1;padding:20px 0;overflow-y:auto;}
.nav-section{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--cinza);padding:10px 24px 6px;opacity:.6;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;font-size:14px;font-weight:600;color:rgba(240,244,255,0.6);transition:all .2s;border-left:3px solid transparent;text-decoration:none;}
.nav-item:hover{color:var(--branco);background:rgba(0,201,122,0.06);border-left-color:rgba(0,201,122,0.4);}
.nav-item.active{color:var(--verde);background:rgba(0,201,122,0.1);border-left-color:var(--verde);}
.sidebar-footer{padding:20px 24px;border-top:1px solid rgba(0,201,122,0.1);}
.user-info{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.user-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--verde),#00A865);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--azul);overflow:hidden;}
.user-avatar.has-foto{background:none!important;}
.user-avatar.has-foto img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.user-name{font-size:13px;font-weight:600;}.user-role{font-size:11px;color:var(--cinza);}
.btn-logout{width:100%;padding:9px;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.2);border-radius:8px;color:#FF6B6B;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.main{margin-left:var(--sidebar-w);flex:1;padding:28px 32px;overflow-y:auto;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px;}
.page-header h1{font-family:'Bebas Neue',cursive;font-size:38px;letter-spacing:2px;line-height:1;}
.page-header p{font-size:14px;color:var(--cinza);margin-top:4px;}
.btn-voltar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--cinza);font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;padding:9px 18px;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-voltar:hover{background:rgba(255,255,255,0.1);color:var(--branco);}
.card-dark{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:28px;}
.form-control,.form-select{background:rgba(255,255,255,0.05)!important;border:1.5px solid rgba(255,255,255,0.1)!important;border-radius:10px!important;color:var(--branco)!important;font-family:'Barlow',sans-serif;}
.form-control:focus,.form-select:focus{border-color:var(--verde)!important;box-shadow:0 0 0 3px rgba(0,201,122,0.15)!important;}
.form-control::placeholder{color:rgba(136,153,187,0.4)!important;}
.form-select option{background:#0D1E3C;}
label.form-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--cinza);margin-bottom:6px;display:block;}
.required{color:#FF6B6B;}
.field-hint{font-size:11px;margin-top:4px;display:none;}
.field-hint.show{display:block;}
.field-hint.ok{color:#00C97A;}
.field-hint.err{color:#FF6B6B;}
.form-control.is-valid{border-color:#00C97A!important;}
.form-control.is-invalid{border-color:#FF6B6B!important;background:rgba(255,80,80,0.04)!important;}
.color-picker-wrap{display:flex;align-items:center;gap:10px;}
.color-swatch{width:38px;height:38px;border-radius:9px;border:2px solid rgba(255,255,255,0.15);cursor:pointer;flex-shrink:0;transition:transform .2s;}
.color-swatch:hover{transform:scale(1.1);}
.treinador-grid{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;padding-right:4px;}
.tr-option{display:flex;align-items:center;gap:12px;padding:11px 14px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.07);border-radius:10px;cursor:pointer;transition:all .2s;}
.tr-option:hover{background:rgba(0,201,122,0.06);border-color:rgba(0,201,122,0.2);}
.tr-option.selected{background:rgba(0,201,122,0.1);border-color:rgba(0,201,122,0.4);}
.tr-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;overflow:hidden;}
.tr-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.tr-nome{font-size:14px;font-weight:700;flex:1;}
.tr-tipo{font-size:11px;color:var(--cinza);}
.tr-check{width:20px;height:20px;border-radius:50%;background:var(--verde);display:none;align-items:center;justify-content:center;flex-shrink:0;}
.tr-option.selected .tr-check{display:flex;}
.preview-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;overflow:hidden;position:sticky;top:24px;}
.preview-banner{height:8px;transition:background .3s;}
.preview-body{padding:20px;}
.preview-logo{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:22px;color:#fff;transition:all .3s;margin-bottom:14px;}
.preview-nome{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:1px;min-height:30px;}
.preview-sub{font-size:13px;color:var(--cinza);margin-top:4px;}
.preview-info{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;gap:8px;}
.preview-info-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--cinza);}
.preview-info-row strong{color:var(--branco);}
.btn-salvar{background:linear-gradient(135deg,var(--verde),#00A865);border:none;color:var(--azul);font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:2px;padding:12px 36px;border-radius:10px;cursor:pointer;transition:all .2s;}
.btn-salvar:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,201,122,0.3);}
.btn-salvar:disabled{opacity:.5;pointer-events:none;}
.btn-cancelar-form{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--cinza);font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:2px;padding:12px 24px;border-radius:10px;cursor:pointer;text-decoration:none;display:inline-block;}
/* loading */
.loading-full{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:var(--cinza);}
.spin{width:32px;height:32px;border:3px solid rgba(0,201,122,0.2);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg)}}
/* time indicator */
.time-indicator{margin:0 12px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;text-decoration:none;transition:background .2s;}
.time-indicator:hover{background:rgba(255,255,255,0.08);}
.ti-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ti-nome{font-size:12px;font-weight:700;color:var(--branco);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.ti-trocar{font-size:10px;color:var(--cinza);font-weight:600;white-space:nowrap;}
/* toast */
.toast-wrap{position:fixed;bottom:28px;right:28px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast-item{background:#0D1E3C;border:1px solid rgba(0,201,122,0.3);border-radius:12px;padding:11px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;color:var(--branco);}
.toast-item.erro{border-color:rgba(255,80,80,0.3);}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
/* logout modal */
#logoutModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:99998;display:none;align-items:center;justify-content:center;}
#logoutModal.show{display:flex;}
.logout-card{background:linear-gradient(135deg,#0D1E3C,#112244);border:1px solid rgba(255,80,80,.25);border-radius:20px;padding:36px 40px;text-align:center;max-width:360px;width:90%;}
.logout-titulo{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:2px;margin-bottom:8px;}
.logout-msg{font-size:14px;color:var(--cinza);margin-bottom:28px;line-height:1.6;}
.logout-btns{display:flex;gap:12px;justify-content:center;}
.btn-logout-cancel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--cinza);font-family:'Bebas Neue',cursive;font-size:16px;padding:11px 28px;border-radius:10px;cursor:pointer;}
.btn-logout-confirm{background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.35);color:#FF6B6B;font-family:'Bebas Neue',cursive;font-size:16px;padding:11px 28px;border-radius:10px;cursor:pointer;}
/* light theme */
/* ── LOGO UPLOAD ── */
.logo-upload-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 0 20px;}
.logo-circle{
  width:88px;height:88px;border-radius:18px;
  background:rgba(0,201,122,0.08);
  border:2px dashed rgba(0,201,122,0.35);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;cursor:pointer;transition:all .2s;position:relative;
}
.logo-circle:hover{border-color:var(--verde);background:rgba(0,201,122,0.14);}
.logo-circle img{width:100%;height:100%;object-fit:cover;border-radius:16px;}
.logo-circle .logo-initials{
  font-family:'Bebas Neue',cursive;font-size:28px;color:var(--verde);
  letter-spacing:1px;transition:all .2s;
}
.logo-circle .logo-ov{
  position:absolute;inset:0;background:rgba(0,0,0,.5);border-radius:16px;
  display:none;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;
}
.logo-circle:hover .logo-ov{display:flex;}
.logo-hint{font-size:11px;color:var(--cinza);text-align:center;}
.btn-rm-logo{
  background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.2);
  color:#FF6B6B;border-radius:7px;padding:4px 12px;
  font-size:11px;font-weight:700;cursor:pointer;display:none;
}
.btn-rm-logo.show{display:inline-block;}
/* improved form fields */
.form-section-title{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--cinza);margin:6px 0 4px;padding-bottom:6px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.color-preview{
  width:38px;height:38px;border-radius:9px;
  border:2px solid rgba(255,255,255,0.15);
  cursor:pointer;flex-shrink:0;transition:transform .2s;
}
.color-preview:hover{transform:scale(1.1);}

/* ── FORM FIELDS IMPROVED ── */
.form-group-enhanced {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 14px 16px;
  transition: border-color .2s;
}
.form-group-enhanced:focus-within {
  border-color: rgba(0,201,122,0.3);
  background: rgba(0,201,122,0.03);
}
.form-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--cinza);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.form-label .field-icon { opacity: .5; }
.form-control, .form-select {
  background: rgba(255,255,255,0.05) !important;
  border: 1.5px solid rgba(255,255,255,0.1) !important;
  border-radius: 10px !important;
  color: var(--branco) !important;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  padding: 10px 14px;
  transition: all .2s;
}
.form-control:focus, .form-select:focus {
  border-color: var(--verde) !important;
  box-shadow: 0 0 0 3px rgba(0,201,122,0.12) !important;
  background: rgba(0,201,122,0.04) !important;
}
.form-control::placeholder { color: rgba(136,153,187,0.35) !important; }
.form-select option { background: #0D1E3C; }
.field-row-icon {
  display: flex; align-items: center; gap: 10px;
}
.field-row-icon svg { flex-shrink: 0; opacity: .5; }
.form-control.is-valid  { border-color: #00C97A !important; }
.form-control.is-invalid{ border-color: #FF6B6B !important; background: rgba(255,80,80,0.04) !important; }
</style>
</head>
<body>

<div id="logoutModal">
  <div class="logout-card">
    <div style="font-size:40px;margin-bottom:16px">👋</div>
    <div class="logout-titulo">Sair do Sistema?</div>
    <div class="logout-msg">Sua sessão será encerrada.<br>Deseja realmente sair?</div>
    <div class="logout-btns">
      <button class="btn-logout-cancel" onclick="fecharLogout()">Cancelar</button>
      <button class="btn-logout-confirm" onclick="confirmarLogout()">Sair</button>
    </div>
  </div>
</div>

<aside class="sidebar">
  <div class="sidebar-logo" id="sidebarLogo">
 <div class="logo-icon" id="sidebarLogoIcon">L</div>
 <div class="logo-texts"><div class="t1" id="sidebarNomeTime">LAIVY</div><div class="t2">Sistema Esportivo</div></div>
</div>
  <nav>
    <div class="nav-section">Principal</div>
    <a href="dashboard.html"  class="nav-item">Dashboard</a>
    <a href="usuarios.html"   class="nav-item">Usuários</a>
    <div class="nav-section">Admin</div>
    <a href="cadastrar-treinador.html" class="nav-item">Treinadores</a>
    <div class="nav-section">Gestão</div>
    <a href="exames.html"     class="nav-item">Exames</a>
    <a href="desempenho.html" class="nav-item">Desempenho</a>
    <a href="atividades.html" class="nav-item">Atividades</a>
    <a href="escalacao.html"  class="nav-item">Escalação</a>
    <a href="calendario.html" class="nav-item">Calendário</a>
    <a href="visitantes.html" class="nav-item">Visitantes</a>
  </nav>
  <a href="selecionar-time.html" class="time-indicator" id="timeSidebarIndicator" style="display:none">
    <div class="ti-dot"></div>
    <div class="ti-nome">—</div>
    <div class="ti-trocar">Trocar</div>
  </a>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="avatarLetra">A</div>
      <div><div class="user-name" id="nomeUsuario">—</div><div class="user-role" id="tipoUsuario">—</div></div>
    </div>
    <button class="btn-logout" onclick="logout()">Sair do Sistema</button>
  </div>
</aside>

<main class="main" id="mainContent">
  <div class="loading-full">
    <div class="spin"></div>
    Carregando dados do time...
  </div>
</main>

<div class="toast-wrap" id="toastWrap"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── AUTH ──
const user = JSON.parse(sessionStorage.getItem('usuario') || '{}');
if (!user.id_usuario) window.location.href = 'login.html';
if (user.tipo_usuario !== 1) window.location.href = 'times.html';

document.getElementById('nomeUsuario').textContent = user.nome_usuario || '—';
document.getElementById('avatarLetra').textContent = (user.nome_usuario || 'U')[0].toUpperCase();
document.getElementById('tipoUsuario').textContent = ({1:'Administrador',2:'Treinador',3:'Atleta'})[user.tipo_usuario] || '—';
if(user.foto_usuario){var av=document.getElementById('avatarLetra');av.classList.add('has-foto');av.innerHTML='<img src="'+user.foto_usuario+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';}

// ── TIME INDICATOR ──
(function(){
  var ts=JSON.parse(sessionStorage.getItem('timeSelecionado')||'null');
  var el=document.getElementById('timeSidebarIndicator');
  if(!el)return;
  if(ts){el.style.display='flex';var dot=el.querySelector('.ti-dot');var nome=el.querySelector('.ti-nome');if(dot)dot.style.background=ts.cor||'#00C97A';if(nome)nome.textContent=ts.nome||'Time';}
  else{el.style.display='none';}
})();

// ── LOGOUT / THEME ──
function logout(){document.getElementById('logoutModal').classList.add('show');}
function fecharLogout(){document.getElementById('logoutModal').classList.remove('show');}
function confirmarLogout(){sessionStorage.clear();window.location.href='login.html';}
// ── HELPERS ──
function ini(n){return(n||'?').split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase();}
function toast(msg,ok=true){const el=document.createElement('div');el.className='toast-item'+(ok?'':' erro');el.innerHTML=(ok?'✅':'❌')+' '+msg;document.getElementById('toastWrap').appendChild(el);setTimeout(()=>el.remove(),3200);}

const API   = '/times';
const API_U = '/usuarios';

// ── GET TIME ID FROM URL ──
const params   = new URLSearchParams(window.location.search);
const timeId   = parseInt(params.get('id'));
if (!timeId) window.location.href = 'times.html';

let treinadorSelecionadoId = null;
let logoBase64 = null;
let timeAtual = null;

// ── LOAD DATA ──
Promise.all([
  fetch(API + '/' + timeId).then(r => { if(!r.ok) throw new Error(); return r.json(); }),
  fetch(API_U).then(r => r.json()),
]).then(([time, usuarios]) => {
  timeAtual = time;
  logoBase64 = time.logo_time || null;
  renderForm(time, usuarios);
}).catch(() => {
  document.getElementById('mainContent').innerHTML =
    '<div class="loading-full"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div style="font-family:\'Bebas Neue\',cursive;font-size:22px;margin-bottom:8px">Time não encontrado</div><div style="color:var(--cinza)">Verifique o ID ou volte para a lista.</div><br></div>';
});

function renderForm(t, usuarios) {
  const cor = t.cor_time || '#00C97A';

  document.getElementById('mainContent').innerHTML = `
  <div class="page-header">
    <div>
      <h1>Editar Time</h1>
      <p>Atualize as informações do time <strong style="color:var(--verde)">${t.nome_time}</strong></p>
    </div>
  </div>

  <div class="row g-4" style="align-items:flex-start">
    <div class="col-lg-7">
      <div class="card-dark">
        <form id="formTime" novalidate>
          <input type="hidden" id="inp-treinador-id" value="${t.treinador ? t.treinador.id_usuario : ''}">
          <div class="row g-3">

            <!-- LOGO -->
            <div class="col-12">
              <div class="logo-upload-wrap">
                <div class="logo-circle" id="logoCircle" onclick="document.getElementById('inputLogo').click()">
                  ${t.logo_time
                    ? '<img id="logoPreviewImg" src="'+t.logo_time+'" style="width:100%;height:100%;object-fit:cover;border-radius:16px" alt="logo">'
                    : '<span class="logo-initials" id="logoInitials">' + ini(t.nome_time) + '</span><img id="logoPreviewImg" style="display:none" alt="logo">'}
                  <div class="logo-ov">Alterar</div>
                </div>
                <input type="file" id="inputLogo" accept="image/*" style="display:none" onchange="logoCarregar(this)">
                <div class="logo-hint">Logo do time · JPG, PNG · máx 2MB</div>
                <button type="button" class="btn-rm-logo ${t.logo_time ? 'show' : ''}" id="btnRmLogo" onclick="logoRemover()">Remover logo</button>
                <input type="hidden" id="inpLogoB64" name="logo_time" value="${t.logo_time || ''}">
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Nome do Time <span class="required">*</span></label>
              <input class="form-control" id="inp-nome" name="nome_time"
                value="${t.nome_time || ''}" placeholder="Ex: Basquete Sub-17" required oninput="previewAtualizar()">
              <div class="field-hint" id="hint-nome"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Modalidade</label>
              <input class="form-control" value="Basquete" name="modalidade_time" readonly
                style="opacity:.6;cursor:not-allowed;">
            </div>

            <div class="col-md-6">
              <label class="form-label">Categoria</label>
              <select class="form-select" name="categoria_time" id="sel-categoria" onchange="previewAtualizar()">
                ${['Sub-13','Sub-15','Sub-17','Sub-20','Adulto','Feminino','Misto'].map(c =>
                  `<option value="${c}" ${(t.categoria_time||'Sub-17')===c?'selected':''}>${c}</option>`
                ).join('')}
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Cor do Time</label>
              <div class="color-picker-wrap">
                <div class="color-swatch" id="colorSwatch" style="background:${cor}"
                  onclick="document.getElementById('inputCor').click()"></div>
                <input type="color" id="inputCor" name="cor_time" value="${cor}"
                  style="opacity:0;width:0;height:0;position:absolute"
                  oninput="syncCor(this.value)" onchange="syncCor(this.value)">
                <span style="font-size:13px;color:var(--cinza)" id="corHexLabel">${cor}</span>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Status</label>
              <select class="form-select" name="ativo_time" onchange="previewAtualizar()">
                <option value="1" ${(t.ativo_time===1||t.ativo_time==='1')?'selected':''}>Ativo</option>
                <option value="0" ${(t.ativo_time===0||t.ativo_time==='0')?'selected':''}>Inativo</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label">Treinador Responsável <span class="required">*</span></label>
              <div class="field-hint" id="hint-treinador"></div>
              <div class="treinador-grid" id="treinadorGrid"></div>
              <select name="treinador_id" id="selectTreinador" style="display:none"></select>
            </div>

            <div class="col-12">
              <label class="form-label">Descrição</label>
              <textarea class="form-control" name="descricao_time" rows="3"
                placeholder="Observações sobre o time...">${t.descricao_time || ''}</textarea>
            </div>

            <div class="col-12 d-flex gap-3 mt-2">
              <button type="submit" class="btn-salvar" id="btnSubmit">Salvar Alterações</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="col-lg-5">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--cinza);margin-bottom:12px;padding-left:4px">Pré-visualização</div>
      <div class="preview-card">
        <div class="preview-banner" id="pvBanner" style="background:${cor}"></div>
        <div class="preview-body">
          <div class="preview-logo" id="pvLogo"
            style="background:${cor}22;border:2px solid ${cor}44;color:${cor}">${ini(t.nome_time)}</div>
          <div class="preview-nome" id="pvNome">${t.nome_time}</div>
          <div class="preview-sub" id="pvSub">Basquete · ${t.categoria_time || 'Sub-17'}</div>
          <div class="preview-info">
            <div class="preview-info-row">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21v-2a7 7 0 0 1 14 0v2"/></svg>
              Treinador: <strong id="pvTreinNome">${t.treinador ? t.treinador.nome_usuario : 'Não selecionado'}</strong>
            </div>
            <div class="preview-info-row">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              Status: <strong id="pvStatus">${(t.ativo_time===1||t.ativo_time==='1')?'Ativo':'Inativo'}</strong>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  // Build treinador grid
  treinadorSelecionadoId = t.treinador ? t.treinador.id_usuario : null;
  const responsaveis = usuarios.filter(u => u.tipo_usuario===1||u.tipo_usuario===2);
  const grid = document.getElementById('treinadorGrid');
  grid.innerHTML = responsaveis.map(u => {
    const bg  = u.tipo_usuario===1?'rgba(0,201,122,0.15)':'rgba(78,201,255,0.15)';
    const col = u.tipo_usuario===1?'#00C97A':'#4EC9FF';
    const lbl = u.tipo_usuario===1?'Administrador':'Treinador';
    const avHTML = u.foto_usuario
      ? '<img src="'+u.foto_usuario+'" alt="">'
      : '<span style="color:'+col+'">'+ini(u.nome_usuario)+'</span>';
    const sel = treinadorSelecionadoId == u.id_usuario ? ' selected' : '';
    return '<div class="tr-option'+sel+'" data-tid="'+u.id_usuario+'" data-tnome="'+u.nome_usuario.replace(/"/g,'&quot;')+'" onclick="selecionarTreinador(this.dataset.tid,this.dataset.tnome)">'
      +'<div class="tr-av" style="background:'+bg+'">'+avHTML+'</div>'
      +'<div style="flex:1;min-width:0"><div class="tr-nome">'+u.nome_usuario+'</div>'
      +'<div class="tr-tipo">'+lbl+'</div></div>'
      +'<div class="tr-check"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#0A1628" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
    +'</div>';
  }).join('');

  // Form submit
  document.getElementById('formTime').addEventListener('submit', function(e){
    e.preventDefault();
    if(!validar()) return;
    const d = Object.fromEntries(new FormData(this).entries());
    const payload = {
      nome_time:       d.nome_time,
      modalidade_time: 'Basquete',
      categoria_time:  d.categoria_time,
      cor_time:        d.cor_time || t.cor_time,
      logo_time:       logoBase64 !== null ? logoBase64 : (t.logo_time || null),
      descricao_time:  d.descricao_time || '',
      ativo_time:      parseInt(d.ativo_time),
      treinador:       treinadorSelecionadoId ? {id_usuario:parseInt(treinadorSelecionadoId)} : null,
    };
    const btn = document.getElementById('btnSubmit');
    btn.textContent = 'Salvando...'; btn.disabled = true;
    fetch(API+'/'+timeId, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    })
    .then(r=>{ if(!r.ok) throw new Error(); return r.json(); })
    .then(()=>{
      toast('Time atualizado com sucesso!');
      setTimeout(()=>{ window.location.href='times.html'; }, 1200);
    })
    .catch(()=>{
      toast('Erro ao salvar. Verifique o servidor.',false);
      btn.textContent='Salvar Alterações'; btn.disabled=false;
    });
  });
}

function selecionarTreinador(id, nome){
  treinadorSelecionadoId = parseInt(id)||id;
  document.getElementById('inp-treinador-id').value = treinadorSelecionadoId;
  document.querySelectorAll('.tr-option').forEach(el=>el.classList.remove('selected'));
  const opt = document.querySelector('[data-tid="'+id+'"]');
  if(opt) opt.classList.add('selected');
  document.getElementById('pvTreinNome').textContent = nome;
  const h=document.getElementById('hint-treinador');
  h.textContent='Treinador selecionado'; h.className='field-hint show ok';
}

function previewAtualizar(){
  const nome  = document.getElementById('inp-nome')?.value.trim() || '';
  const categ = document.getElementById('sel-categoria')?.value || 'Sub-17';
  const cor   = document.getElementById('inputCor')?.value || '#00C97A';
  const stEl  = document.querySelector('[name="ativo_time"]');
  const stTxt = stEl?.value==='1'?'Ativo':'Inativo';
  const pv    = document.getElementById('pvBanner');
  if(pv) pv.style.background = cor;
  const pvN = document.getElementById('pvNome'); if(pvN) pvN.textContent = nome||'Nome do Time';
  const pvS = document.getElementById('pvSub');  if(pvS) pvS.textContent = 'Basquete · '+categ;
  const pvSt= document.getElementById('pvStatus');if(pvSt) pvSt.textContent = stTxt;
  const logo = document.getElementById('pvLogo');
  if(logo){
    const ini2 = nome ? nome.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase() : '—';
    logo.textContent = ini2;
    logo.style.background = cor+'22';
    logo.style.border = '2px solid '+cor+'44';
    logo.style.color  = cor;
  }
  const sw = document.getElementById('colorSwatch'); if(sw) sw.style.background=cor;
}

function syncCor(val){
  document.getElementById('colorSwatch').style.background = val;
  document.getElementById('corHexLabel').textContent = val;
  previewAtualizar();
}

function validar(){
  let ok = true;
  const nome  = document.getElementById('inp-nome');
  const hNome = document.getElementById('hint-nome');
  if(nome && !nome.value.trim()){
    nome.classList.add('is-invalid'); nome.classList.remove('is-valid');
    hNome.textContent='Nome é obrigatório'; hNome.className='field-hint show err';
    ok=false;
  } else if(nome){
    nome.classList.add('is-valid'); nome.classList.remove('is-invalid');
    hNome.textContent=''; hNome.className='field-hint';
  }
  const hTrein = document.getElementById('hint-treinador');
  if(!treinadorSelecionadoId){
    hTrein.textContent='Selecione um treinador responsável'; hTrein.className='field-hint show err';
    ok=false;
  }
  return ok;
}
</script>

<script>
(function(){
  var ts = JSON.parse(sessionStorage.getItem('timeSelecionado') || 'null');
  if (!ts) return;
  var icon = document.getElementById('sidebarLogoIcon');
  var nome = document.getElementById('sidebarNomeTime');
  if (nome) nome.textContent = ts.nome || 'LAIVY';
  if (icon) {
    if (ts.logo) {
      icon.style.background = 'none';
      icon.style.padding = '0';
      icon.innerHTML = '<img src="' + ts.logo + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">';
    } else {
      var ini = (ts.nome || 'L').split(' ').slice(0,2).map(function(x){return x[0];}).join('').toUpperCase();
      icon.textContent = ini;
      if (ts.cor) icon.style.background = 'linear-gradient(135deg,' + ts.cor + ',' + ts.cor + 'AA)';
    }
  }
})();
</script>
</body>
</html>
